<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | LogiTrack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">

  <div class="glass" style="max-width: 400px; width: 100%; text-align: center;">
    <h2 style="margin-top: 0;">Admin Portal</h2>
    <p style="color: #94a3b8; margin-bottom: 20px;">Enter security credentials</p>
    
    <div class="form-group" style="text-align: left;">
      <label>Master Password</label>
      <input type="password" id="adminPassword" placeholder="••••••••">
    </div>
    
    <button onclick="login()" style="width: 100%; margin-top: 10px;">Authenticate</button>
    <div id="loginError" style="color: #ef4444; margin-top: 15px; font-weight: 500;"></div>
  </div>

<script>
async function login() {
  const password = document.getElementById('adminPassword').value;
  const errorDiv = document.getElementById('loginError');
  
  if (!password) {
      errorDiv.innerText = "Password required.";
      return;
  }

  errorDiv.innerText = "";
  
  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    
    if (res.ok) {
      window.location.href = '/admin/shipments-page';
    } else {
      errorDiv.innerText = "Access Denied: Invalid Credentials.";
    }
  } catch (err) {
    errorDiv.innerText = "Server connection failed.";
  }
}
</script>
</body>
</html>
